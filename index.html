<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitácora de Trading</title>
    <!-- Tailwind CSS para un diseño elegante y responsivo sin escribir CSS extra -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Librería de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="mb-8 border-b border-gray-700 pb-4">
            <h1 class="text-3xl font-bold text-blue-400">Mi Bitácora de Trading</h1>
            <p class="text-gray-400 text-sm mt-1">Registro y análisis de operaciones</p>
        </header>

        <!-- Panel de Estado -->
        <div class="bg-gray-800 rounded-lg p-6 mb-8 shadow-lg">
            <h2 class="text-xl font-semibold mb-4 text-gray-200">Estado de Conexión</h2>
            <button id="btn-probar" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded transition-colors">
                Verificar Supabase
            </button>
            <p id="mensaje-estado" class="mt-3 text-sm text-gray-400"></p>
        </div>
    </div>

    <script>
        // 1. REEMPLAZA ESTAS DOS LÍNEAS con tus datos de Supabase (Project URL y Anon Key)
        const supabaseUrl = 'TU_PROJECT_URL_AQUI';
        const supabaseKey = 'TU_ANON_PUBLIC_KEY_AQUI';
        
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // 2. Función de prueba
        document.getElementById('btn-probar').addEventListener('click', async () => {
            const mensaje = document.getElementById('mensaje-estado');
            mensaje.innerText = "Conectando...";
            mensaje.className = "mt-3 text-sm text-yellow-400";

            const { data, error } = await supabase
                .from('bitacora_trading')
                .select('*');
            
            if (error) {
                console.error("Error:", error);
                mensaje.innerText = "Error de conexión. Revisa la consola o las políticas RLS.";
                mensaje.className = "mt-3 text-sm text-red-400";
            } else {
                console.log("Datos:", data);
                mensaje.innerText = "¡Conexión exitosa! Base de datos enlazada correctamente.";
                mensaje.className = "mt-3 text-sm text-green-400";
            }
        });
    </script>
</body>
</html>
