<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zasweb - Trading Journal Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .glass-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; }
        .text-neon-green { color: #10b981; }
        .text-neon-red { color: #ef4444; }
        .bg-long { background-color: #064e3b; color: #34d399; }
        .bg-short { background-color: #7f1d1d; color: #f87171; }
        input, select { background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; padding: 10px; width: 100%; font-size: 14px; outline: none; transition: 0.3s; }
        input:focus, select:focus { border-color: #3b82f6; }
        label { font-size: 11px; text-transform: uppercase; color: #94a3b8; font-weight: bold; margin-bottom: 4px; display: block; }
    </style>
</head>
<body class="p-4 md:p-8 max-w-7xl mx-auto">

    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
        
        <div class="glass-card p-4 md:col-span-1 bg-slate-800/50">
            <label class="text-blue-400 mb-1">Capital Base ($)</label>
            <input type="number" id="capitalBase" step="any" class="text-2xl font-bold bg-transparent border-b-2 border-slate-600 rounded-none px-0 py-1 mb-3 focus:border-blue-500 focus:bg-slate-900" onchange="actualizarCapitalManual()">
            
            <div class="flex gap-2 mb-3">
                <button onclick="ajustarCapital('sumar')" class="flex-1 bg-emerald-600/20 text-emerald-400 border border-emerald-600/50 hover:bg-emerald-600/40 py-1 rounded text-xs font-bold transition">+ Depósito</button>
                <button onclick="ajustarCapital('restar')" class="flex-1 bg-rose-600/20 text-rose-400 border border-rose-600/50 hover:bg-rose-600/40 py-1 rounded text-xs font-bold transition">- Retiro</button>
            </div>
            
            <div class="flex justify-between items-center border-t border-slate-700 pt-2">
                <span class="text-xs text-slate-400 uppercase font-bold">Disponible:</span>
                <span id="stat-capital-disp" class="text-lg text-white font-bold">$0.00</span>
            </div>
        </div>

        <div class="glass-card p-4">
            <span class="text-xs text-slate-400 font-bold uppercase mb-2 block">Total Ops</span>
            <div id="stat-ops" class="text-2xl font-bold">0</div>
            <div id="stat-ops-detail" class="text-xs text-slate-400 mt-1">0W - 0L - 0BE</div>
        </div>
        
        <div class="glass-card p-4">
            <span class="text-xs text-slate-400 font-bold uppercase mb-2 block">Winrate</span>
            <div id="stat-winrate" class="text-2xl font-bold">0%</div>
            <div class="text-xs text-slate-400 mt-1">De operaciones cerradas</div>
        </div>
        
        <div class="glass-card p-4">
            <span class="text-xs text-slate-400 font-bold uppercase mb-2 block">PnL Total</span>
            <div id="stat-pnl" class="text-2xl font-bold text-slate-300">$0.00</div>
            <div class="text-xs text-slate-400 mt-1">Ganancia neta acumulada</div>
        </div>
    </div>

    <div class="glass-card p-4 mb-6 hidden md:block">
        <span class="text-sm text-slate-200 font-bold mb-4 block">Curva de Capital</span>
        <div class="h-48 w-full"><canvas id="chartCapital"></canvas></div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="glass-card p-5 h-fit lg:col-span-1">
            <h2 class="text-lg font-bold mb-4 flex justify-between items-center">
                Nueva Posición
            </h2>
            
            <div class="bg-slate-900 border border-slate-700 rounded-lg p-3 mb-4 text-center">
                <div id="display-riesgo" class="text-sm text-slate-300">Riesgo: <b>$0.00</b> | Lotaje: <b>0.0000</b></div>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-3">
                <div>
                    <label>Riesgo (%)</label>
                    <input type="number" id="riesgoP" value="2" step="0.1" oninput="calcularRiesgo()">
                </div>
                <div>
                    <label>Comisión (%)</label>
                    <input type="number" id="comision" value="0.05" step="0.01" oninput="calcularRiesgo()">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-3">
                <div>
                    <label>Activo</label>
                    <select id="activo" onchange="toggleOtro()">
                        <option value="BTC">BTC</option><option value="ETH">ETH</option><option value="SOL">SOL</option><option value="BNB">BNB</option><option value="OTRO">Otro...</option>
                    </select>
                </div>
                <div>
                    <label>Temporalidad</label>
                    <select id="temporalidad">
                        <option value="1m">1m</option><option value="5m">5m</option><option value="15m">15m</option>
                        <option value="1H">1H</option><option value="4H" selected>4H</option><option value="1D">1D</option><option value="1S">1S</option>
                    </select>
                </div>
            </div>
            
            <div id="div-otro" class="mb-3 hidden">
                <label>Nombre del Activo</label>
                <input type="text" id="activoOtro" placeholder="Ej: RNDR">
            </div>

            <div class="mb-3">
                <label>Dirección</label>
                <select id="direccion" class="font-bold" onchange="calcularRiesgo()">
                    <option value="LONG">LONG (Compra)</option>
                    <option value="SHORT">SHORT (Venta)</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-5">
                <div>
                    <label>Precio Entrada</label>
                    <input type="number" id="entrada" step="any" placeholder="0.00" oninput="calcularRiesgo()">
                </div>
                <div>
                    <label>Stop Loss (SL)</label>
                    <input type="number" id="sl" step="any" placeholder="0.00" oninput="calcularRiesgo()">
                </div>
            </div>

            <button onclick="guardarOperacion()" id="btnGuardar" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition shadow-lg">
                Abrir Posición
            </button>
        </div>

        <div class="lg:col-span-2 space-y-6">
            
            <div>
                <h2 class="text-lg font-bold mb-3 text-slate-200">Posiciones Abiertas</h2>
                <div id="lista-abiertas" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>

            <div>
                <h2 class="text-lg font-bold mb-3 text-slate-200 flex justify-between">
                    Historial
                    <button onclick="cargarDatos()" class="text-xs bg-slate-800 px-3 py-1 rounded text-slate-300 hover:bg-slate-700">🔄 Actualizar</button>
                </h2>
                <div id="lista-cerradas" class="space-y-3"></div>
            </div>
            
        </div>
    </div>

    <div id="modalCierre" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50 p-4">
        <div class="glass-card p-6 w-full max-w-sm border-slate-600">
            <h3 class="text-lg font-bold mb-4 text-blue-400">Cerrar Operación</h3>
            <input type="hidden" id="modal-id">
            
            <div class="mb-4">
                <label>Tipo de Cierre</label>
                <select id="modal-tipo" class="bg-slate-900 border-slate-700">
                    <option value="TOTAL">Cierre Total (100%)</option>
                    <option value="PARCIAL">Cierre Parcial (Proteger a BE)</option>
                </select>
            </div>
            
            <div class="mb-5">
                <label>PnL Realizado ($ USDT)</label>
                <input type="number" id="modal-pnl" step="any" placeholder="Ej: 15.50 o -5.20" class="bg-slate-900 border-slate-700 text-lg font-bold text-center">
            </div>

            <div class="flex gap-3 mt-5">
                <button onclick="cerrarModal()" class="w-1/2 bg-slate-700 hover:bg-slate-600 py-2.5 rounded font-bold transition">Cancelar</button>
                <button onclick="ejecutarCierre()" class="w-1/2 bg-blue-600 hover:bg-blue-500 py-2.5 rounded font-bold transition">Confirmar</button>
            </div>
        </div>
    </div>

    <script>
        // --- CREDENCIALES SUPABASE ---
        const supabaseUrl = 'https://tdkhfbiltatjwzaubxtv.supabase.co';
        const supabaseKey = 'sb_publishable_nEVEwlTt78w6vjcYMYr4kQ_DS4mxM50';
        const db = window.supabase.createClient(supabaseUrl, supabaseKey);

        let chartInstance = null;
        let operacionActualCalculada = { tamano: 0, riesgoUsdt: 0 };
        let operacionesCargadas = [];

        // Inicialización
        window.addEventListener('DOMContentLoaded', () => {
            let capGuardado = localStorage.getItem('zasweb_capital');
            if(!capGuardado) {
                capGuardado = '1000';
                localStorage.setItem('zasweb_capital', capGuardado);
            }
            document.getElementById('capitalBase').value = parseFloat(capGuardado).toFixed(2);
            cargarDatos();
        });

        // --- GESTIÓN DE CAPITAL ---
        function actualizarCapitalManual() {
            const val = parseFloat(document.getElementById('capitalBase').value) || 0;
            localStorage.setItem('zasweb_capital', val);
            calcularRiesgo();
            renderizarEstadisticas();
        }

        function ajustarCapital(accion) {
            const cantidad = parseFloat(prompt(`¿Cuánto dinero quieres ${accion === 'sumar' ? 'depositar' : 'retirar'}?`));
            if(!cantidad || isNaN(cantidad)) return;

            let capActual = parseFloat(document.getElementById('capitalBase').value) || 0;
            if(accion === 'sumar') capActual += cantidad;
            if(accion === 'restar') capActual -= cantidad;

            document.getElementById('capitalBase').value = capActual.toFixed(2);
            actualizarCapitalManual();
        }

        function toggleOtro() {
            document.getElementById('div-otro').style.display = document.getElementById('activo').value === 'OTRO' ? 'block' : 'none';
        }

        // --- MATEMÁTICAS DE RIESGO ---
        function calcularRiesgo() {
            const capBase = parseFloat(document.getElementById('capitalBase').value) || 0;
            const rP = parseFloat(document.getElementById('riesgoP').value) || 0;
            const comisionP = parseFloat(document.getElementById('comision').value) || 0;
            const ent = parseFloat(document.getElementById('entrada').value) || 0;
            const sl = parseFloat(document.getElementById('sl').value) || 0;

            const riesgoUsdt = capBase * (rP / 100);
            let tamano = 0;

            if (ent > 0 && sl > 0 && ent !== sl) {
                const comisionDec = comisionP / 100;
                const divisor = Math.abs(ent - sl) + (ent + sl) * comisionDec;
                tamano = riesgoUsdt / divisor;
            }

            operacionActualCalculada = { tamano, riesgoUsdt };
            document.getElementById('display-riesgo').innerHTML = `Riesgo: <b class="text-white">$${riesgoUsdt.toFixed(2)}</b> | Lot: <b class="text-white">${tamano.toFixed(5)}</b>`;
        }

        // --- GUARDAR A BASE DE DATOS ---
        async function guardarOperacion() {
            let activo = document.getElementById('activo').value;
            if(activo === 'OTRO') activo = document.getElementById('activoOtro').value.toUpperCase();
            
            const ent = parseFloat(document.getElementById('entrada').value);
            const sl = parseFloat(document.getElementById('sl').value);
            if(!ent || !sl) return alert("Completa los precios de entrada y SL.");

            const op = {
                activo: activo,
                direccion: document.getElementById('direccion').value,
                temporalidad: document.getElementById('temporalidad').value,
                precio_entrada: ent,
                precio_sl: sl,
                riesgo_porcentaje: document.getElementById('riesgoP').value,
                riesgo_usdt: operacionActualCalculada.riesgoUsdt,
                lotaje: operacionActualCalculada.tamano
            };

            const btn = document.getElementById('btnGuardar');
            btn.innerText = "Guardando..."; btn.disabled = true;

            const { error } = await db.from('bitacora_trading').insert([op]);
            
            if(error) {
                alert("Error al guardar: " + error.message);
            } else {
                document.getElementById('entrada').value = "";
                document.getElementById('sl').value = "";
                calcularRiesgo();
                await cargarDatos();
            }
            btn.innerText = "Abrir Posición"; btn.disabled = false;
        }

        // --- DESCARGAR Y RENDERIZAR DATOS ---
        async function cargarDatos() {
            const { data, error } = await db.from('bitacora_trading').select('*').order('fecha_operacion', { ascending: false });
            if(error) return console.error(error);
            operacionesCargadas = data;
            renderizarEstadisticas();
        }

        function renderizarEstadisticas() {
            let pnlTotal = 0;
            let riesgoFlotante = 0;
            let wins = 0, losses = 0, bes = 0;
            const capitalBase = parseFloat(document.getElementById('capitalBase').value) || 0;
            
            const abiertasHTML = [];
            const cerradasHTML = [];
            const historialPnl = [0];

            operacionesCargadas.forEach(op => {
                if(op.estado === 'CERRADA' || op.estado === 'BREAKEVEN') {
                    pnlTotal += parseFloat(op.resultado_pnl || 0);
                }
                if(op.estado === 'ABIERTA') {
                    riesgoFlotante += parseFloat(op.riesgo_usdt || 0);
                }

                if(op.estado === 'CERRADA' || (op.estado === 'BREAKEVEN' && op.resultado_pnl != 0)) {
                    if(op.resultado_pnl > 0) wins++;
                    else if(op.resultado_pnl < 0) losses++;
                    else bes++;
                } else if (op.estado === 'BREAKEVEN' && op.resultado_pnl == 0) {
                    bes++;
                }

                const fecha = new Date(op.fecha_operacion).toLocaleDateString('es-ES', {month:'short', day:'numeric'});
                const badgeCls = op.direccion === 'LONG' ? 'bg-long' : 'bg-short';
                
                if(op.estado === 'ABIERTA' || op.estado === 'BREAKEVEN') {
                    abiertasHTML.push(`
                        <div class="glass-card p-4 relative overflow-hidden border-slate-700">
                            <div class="absolute left-0 top-0 bottom-0 w-1 ${op.estado === 'BREAKEVEN' ? 'bg-yellow-500' : 'bg-blue-500'} shadow-[0_0_10px_rgba(59,130,246,0.5)]"></div>
                            <div class="flex justify-between items-start mb-3 pl-2">
                                <div>
                                    <h3 class="font-bold text-lg">${op.activo} <span class="text-[10px] px-1.5 py-0.5 rounded ${badgeCls} ml-1">${op.direccion}</span></h3>
                                    <span class="text-xs text-slate-400 border border-slate-600 bg-slate-800 rounded px-1">${op.temporalidad}</span>
                                </div>
                                <span class="text-xs text-slate-400">${fecha}</span>
                            </div>
                            
                            <div class="flex justify-between text-sm mb-4 pl-2">
                                <div><span class="text-slate-400 text-[10px] uppercase block">Riesgo</span><span class="${op.estado === 'BREAKEVEN' ? 'text-slate-500 line-through' : 'text-neon-red font-bold'}">-$${parseFloat(op.riesgo_usdt).toFixed(2)}</span></div>
                                <div><span class="text-slate-400 text-[10px] uppercase block">Lotaje</span><span class="font-bold">${parseFloat(op.lotaje).toFixed(4)}</span></div>
                            </div>
                            
                            <div class="flex gap-2 pl-2">
                                ${op.estado === 'ABIERTA' ? `<button onclick="accionEscudo('${op.id}')" title="Proteger a BreakEven" class="flex-1 bg-slate-800 hover:bg-yellow-600/80 border border-slate-600 text-slate-300 py-1.5 rounded text-sm transition">🛡️ BE</button>` : `<div class="flex-1 text-center bg-yellow-900/30 text-yellow-500 py-1.5 rounded text-xs font-bold border border-yellow-700/50 flex items-center justify-center">PROTEGIDO</div>`}
                                <button onclick="abrirModal('${op.id}', '${op.estado}')" class="flex-1 bg-blue-600/20 hover:bg-blue-600 border border-blue-600/50 text-blue-400 hover:text-white py-1.5 rounded text-sm font-bold transition">Cerrar</button>
                                <button onclick="accionSL('${op.id}', ${op.riesgo_usdt})" class="flex-1 bg-rose-600/20 hover:bg-rose-600 border border-rose-600/50 text-rose-400 hover:text-white py-1.5 rounded text-sm font-bold transition">🛑 SL</button>
                                <button onclick="eliminar('${op.id}')" class="px-3 bg-slate-800 hover:bg-red-900 border border-slate-600 text-slate-400 rounded transition">✕</button>
                            </div>
                        </div>
                    `);
                } else {
                    historialPnl.unshift(pnlTotal);
                    const pnlColor = op.resultado_pnl > 0 ? 'text-neon-green' : (op.resultado_pnl < 0 ? 'text-neon-red' : 'text-slate-400');
                    const signo = op.resultado_pnl > 0 ? '+' : '';
                    cerradasHTML.push(`
                        <div class="glass-card p-3 flex justify-between items-center hover:bg-slate-800/80 transition relative overflow-hidden group border-slate-700">
                            <div class="absolute left-0 top-0 bottom-0 w-1 ${op.resultado_pnl > 0 ? 'bg-emerald-500' : 'bg-rose-500'}"></div>
                            <div class="pl-3">
                                <div class="font-bold flex items-center gap-2">${op.activo} <span class="text-[10px] px-1.5 py-0.5 rounded ${badgeCls}">${op.direccion}</span></div>
                                <div class="text-[11px] text-slate-400 mt-1">${fecha} • ${op.temporalidad} • Lot: ${parseFloat(op.lotaje).toFixed(4)}</div>
                            </div>
                            <div class="text-right flex items-center gap-4">
                                <div class="font-bold ${pnlColor} text-lg">${signo}$${parseFloat(op.resultado_pnl).toFixed(2)}</div>
                                <button onclick="eliminar('${op.id}')" class="text-slate-500 hover:text-rose-400 opacity-0 group-hover:opacity-100 transition bg-slate-800 px-2 py-1 rounded">✕</button>
                            </div>
                        </div>
                    `);
                }
            });

            const capitalActual = capitalBase + pnlTotal;
            const capitalDisponible = capitalActual - riesgoFlotante;
            const totalCerradas = wins + losses + bes;
            const winrate = totalCerradas > 0 ? Math.round((wins / totalCerradas) * 100) : 0;

            document.getElementById('stat-capital-disp').innerText = `$${capitalDisponible.toFixed(2)}`;
            document.getElementById('stat-capital-disp').className = `text-lg font-bold ${capitalDisponible > capitalBase ? 'text-neon-green' : 'text-white'}`;
            
            document.getElementById('stat-ops').innerText = operacionesCargadas.length;
            document.getElementById('stat-ops-detail').innerText = `${wins}W - ${losses}L - ${bes}BE`;
            document.getElementById('stat-winrate').innerText = `${winrate}%`;
            
            const pnlUI = document.getElementById('stat-pnl');
            pnlUI.innerText = `${pnlTotal >= 0 ? '+' : ''}$${pnlTotal.toFixed(2)}`;
            pnlUI.className = `text-2xl font-bold ${pnlTotal >= 0 ? 'text-neon-green' : 'text-neon-red'}`;

            document.getElementById('lista-abiertas').innerHTML = abiertasHTML.length ? abiertasHTML.join('') : '<p class="text-slate-500 text-sm italic">No hay posiciones activas.</p>';
            document.getElementById('lista-cerradas').innerHTML = cerradasHTML.length ? cerradasHTML.join('') : '<p class="text-slate-500 text-sm italic">El historial está vacío.</p>';

            actualizarGrafica(historialPnl, capitalBase);
        }

        // --- ACCIONES EN POSICIONES ---
        async function accionEscudo(id) {
            await db.from('bitacora_trading').update({ estado: 'BREAKEVEN' }).eq('id', id);
            cargarDatos();
        }

        async function accionSL(id, riesgoUsdt) {
            if(confirm("¿Confirmas que la operación tocó Stop Loss completo?")) {
                await db.from('bitacora_trading').update({ estado: 'CERRADA', resultado_pnl: -riesgoUsdt }).eq('id', id);
                cargarDatos();
            }
        }

        async function eliminar(id) {
            if(confirm("¿Eliminar este registro permanentemente de la nube?")) {
                await db.from('bitacora_trading').delete().eq('id', id);
                cargarDatos();
            }
        }

        // --- MODAL DE CIERRE ---
        let modalIdActual = null;

        function abrirModal(id, estado) {
            modalIdActual = id;
            document.getElementById('modal-pnl').value = '';
            document.getElementById('modalCierre').classList.remove('hidden');
            document.getElementById('modalCierre').classList.add('flex');
        }

        function cerrarModal() {
            document.getElementById('modalCierre').classList.add('hidden');
            document.getElementById('modalCierre').classList.remove('flex');
            modalIdActual = null;
        }

        async function ejecutarCierre() {
            const pnl = parseFloat(document.getElementById('modal-pnl').value);
            const tipo = document.getElementById('modal-tipo').value;
            
            if(isNaN(pnl)) return alert("Por favor, ingresa el PnL con el que cerraste.");

            const op = operacionesCargadas.find(o => o.id === modalIdActual);
            const pnlAcumulado = (parseFloat(op.resultado_pnl) || 0) + pnl;
            const nuevoEstado = tipo === 'PARCIAL' ? 'BREAKEVEN' : 'CERRADA';
            
            await db.from('bitacora_trading').update({ estado: nuevoEstado, resultado_pnl: pnlAcumulado }).eq('id', modalIdActual);

            cerrarModal();
            cargarDatos();
        }

        // --- GRÁFICA ---
        function actualizarGrafica(datosPnl, base) {
            let arrayCurva = [base];
            let acumulador = base;
            
            datosPnl.forEach(pnl => {
                if(pnl !== 0) {
                    acumulador = base + pnl;
                    arrayCurva.push(acumulador);
                }
            });

            const ctx = document.getElementById('chartCapital').getContext('2d');
            if(chartInstance) chartInstance.destroy();
            
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: arrayCurva.map((_, i) => `Op ${i}`),
                    datasets: [{
                        label: 'Evolución Capital',
                        data: arrayCurva,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        borderWidth: 2,
                        pointRadius: 3,
                        pointBackgroundColor: '#0f172a',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: false },
                        y: { grid: { color: '#1e293b' }, ticks: { color: '#64748b' } }
                    }
                }
            });
        }
    </script>
</body>
</html>
