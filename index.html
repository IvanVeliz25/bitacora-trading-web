<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zasweb - Trading Journal Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .glass-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; }
        .text-neon-green { color: #10b981; }
        .text-neon-red { color: #ef4444; }
        .bg-long { background-color: #064e3b; color: #34d399; }
        .bg-short { background-color: #7f1d1d; color: #f87171; }
        /* INPUTS MÁS ALTOS Y CÓMODOS */
        input, select { 
    background: #0f172a; 
    border: 1px solid #334155; 
    color: white; 
    border-radius: 8px; 
    width: 100%; 
    outline: none; 
    transition: 0.3s;
    /* Aquí forzamos la altura y el padding contra Tailwind */
    padding: 12px 16px !important; 
    min-height: 50px !important; 
    font-size: 15px !important;
}
        input:focus, select:focus { border-color: #3b82f6; }
        label { font-size: 11px; text-transform: uppercase; color: #94a3b8; font-weight: bold; margin-bottom: 5px; display: block; }
        .modal-overlay { background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); }
    </style>
</head>
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>
<body class="p-4 md:p-8 max-w-7xl mx-auto">

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
        
        <div class="glass-card p-4 bg-slate-800/50 border-blue-500/30 lg:col-span-1">
            <label class="text-blue-400 mb-1 flex justify-between">Capital Disponible</label>
            <div id="stat-capital-disp" class="text-4xl font-bold text-white mb-4">$0.00</div>
            
            <div class="flex gap-2 mb-4">
                <button onclick="abrirModalCapital('DEPOSITO')" class="flex-1 bg-emerald-600/20 text-emerald-400 border border-emerald-600/50 hover:bg-emerald-600/40 py-2 rounded text-sm font-bold transition">+ Inyectar</button>
                <button onclick="abrirModalCapital('RETIRO')" class="flex-1 bg-rose-600/20 text-rose-400 border border-rose-600/50 hover:bg-rose-600/40 py-2 rounded text-sm font-bold transition">- Retirar</button>
            </div>
            
            <div class="flex justify-between items-center border-t border-slate-700 pt-3">
                <span class="text-xs text-slate-400 uppercase font-bold">Base Inicial:</span>
                <span id="stat-capital-base" class="text-sm text-slate-300 font-bold">$0.00</span>
            </div>
        </div>

        <div class="glass-card p-4 hidden lg:block lg:col-span-2">
            <span class="text-sm text-slate-200 font-bold mb-2 block">Curva de Capital</span>
            <div class="h-32 w-full"><canvas id="chartCapital"></canvas></div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="lg:col-span-1 flex flex-col gap-6">
            
            <div class="glass-card p-5 border-slate-700">
                <h2 class="text-lg font-bold mb-4">Nueva Posición</h2>
                
                <div class="bg-slate-900 border border-slate-700 rounded-lg p-3 mb-4 text-center">
                    <div id="display-riesgo" class="text-[13px] text-slate-300">
                        Riesgo: <b>$0.00</b> | Lot: <b>0.0000</b> | Vol: <b>$0.00</b>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div><label>Riesgo (%)</label><input type="number" id="riesgoP" value="2" step="0.1" oninput="calcularRiesgo()"></div>
                    <div><label>Comisión (%)</label><input type="number" id="comision" value="0.05" step="0.01" oninput="calcularRiesgo()"></div>
                </div>

                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div>
                        <label>Activo</label>
                        <select id="activo" onchange="toggleOtro(); asignarRiesgoAutomatico()">
                            <option value="BTC">BTC</option><option value="ETH">ETH</option><option value="SOL">SOL</option><option value="BNB">BNB</option><option value="OTRO">Otro...</option>
                        </select>
                    </div>
                    <div>
                        <label>Temporalidad</label>
                        <select id="temporalidad" onchange="asignarRiesgoAutomatico()">
                            <option value="1m">1m</option><option value="3m">3m</option><option value="5m" selected>5m</option><option value="15m">15m</option>
                            <option value="1H">1H</option><option value="4H">4H</option><option value="1D">1D</option>
                        </select>
                    </div>
                </div>
                
                <div id="div-otro" class="mb-4 hidden"><label>Nombre del Activo</label><input type="text" id="activoOtro" placeholder="Ej: RNDR"></div>
                
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div>
                        <label>Dirección</label>
                        <select id="direccion" class="font-bold" onchange="calcularSlPorDistancia()">
                            <option value="LONG">LONG</option>
                            <option value="SHORT">SHORT</option>
                        </select>
                    </div>
                    <div>
                        <label>Distancia SL (%)</label>
                        <input type="number" id="sl-distancia" step="any" placeholder="Ej: 1.5" oninput="calcularSlPorDistancia()">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3 mb-6">
                    <div><label>Precio Entrada</label><input type="number" id="entrada" value="1" step="any" oninput="calcularSlPorDistancia()"></div>
                    <div><label>Stop Loss (SL)</label><input type="number" id="sl" step="any" placeholder="0.00" oninput="limpiarDistancia()"></div>
                </div>

                <button onclick="guardarOperacion()" id="btnGuardar" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 rounded-lg transition shadow-lg text-base">Abrir Posición</button>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="glass-card p-4 col-span-1">
                    <span class="text-[10px] text-slate-400 font-bold uppercase mb-1 block">Total Ops</span>
                    <div id="stat-ops" class="text-xl font-bold">0</div>
                    <div id="stat-ops-detail" class="text-[10px] text-slate-400 mt-1">0W - 0L - 0BE</div>
                </div>
                
                <div class="glass-card p-4 col-span-1">
                    <span class="text-[10px] text-slate-400 font-bold uppercase mb-1 block">Winrate</span>
                    <div id="stat-winrate" class="text-xl font-bold">0%</div>
                    <div class="text-[10px] text-slate-400 mt-1">De cerradas</div>
                </div>
                
                <div class="glass-card p-4 col-span-2 border-slate-600 bg-slate-800/30">
                    <span class="text-[10px] text-slate-400 font-bold uppercase mb-1 block">PnL Total Acumulado</span>
                    <div id="stat-pnl" class="text-3xl font-bold text-slate-300">$0.00</div>
                </div>
            </div>

        </div>

        <div class="lg:col-span-2 space-y-6">
            <div>
                <h2 class="text-lg font-bold mb-3 text-slate-200">Posiciones Abiertas</h2>
                <div id="lista-abiertas" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
            <div>
                <h2 class="text-lg font-bold mb-3 text-slate-200 flex justify-between items-center">
                    Historial
                    <button onclick="cargarDatos()" class="text-xs bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded transition font-bold">🔄 Actualizar</button>
                </h2>
                <div id="lista-cerradas" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <div id="modalCapital" class="fixed inset-0 modal-overlay hidden items-center justify-center z-50 p-4">
        <div class="glass-card p-6 w-full max-w-sm">
            <h3 id="modal-cap-titulo" class="text-lg font-bold mb-4 text-white">Registrar Capital</h3>
            <input type="hidden" id="modal-cap-tipo">
            <div class="mb-6"><label>Monto ($)</label><input type="number" id="modal-cap-monto" step="any" class="text-xl font-bold text-center"></div>
            <div class="flex gap-3"><button onclick="cerrarModal('modalCapital')" class="w-1/2 bg-slate-700 py-3 rounded font-bold">Cancelar</button><button onclick="ejecutarTransaccionCapital()" class="w-1/2 bg-blue-600 py-3 rounded font-bold">Confirmar</button></div>
        </div>
    </div>

    <div id="modalCierre" class="fixed inset-0 modal-overlay hidden items-center justify-center z-50 p-4">
        <div class="glass-card p-6 w-full max-w-sm">
            <h3 class="text-lg font-bold mb-2 text-blue-400">Cerrar Posición</h3>
            <div id="modal-cierre-info" class="text-xs text-slate-400 mb-4 bg-slate-900 p-2 rounded">Lotaje Abierto: <b>0</b></div>
            <input type="hidden" id="modal-cierre-id"><input type="hidden" id="modal-cierre-max-lot">
            <div class="mb-4"><label>Tipo de Cierre</label><select id="modal-cierre-tipo" onchange="toggleInputsCierre()"><option value="TOTAL">Total (Cierra 100%)</option><option value="PARCIAL">Parcial (Elegir lotaje)</option></select></div>
            <div id="div-lote-parcial" class="mb-4 hidden"><label>Lotaje a Cerrar</label><input type="number" id="modal-cierre-lotaje" step="any"></div>
            <div class="mb-6"><label>PnL Realizado ($ USDT)</label><input type="number" id="modal-cierre-pnl" step="any" class="text-lg font-bold text-center"></div>
            <div class="flex gap-3"><button onclick="cerrarModal('modalCierre')" class="w-1/2 bg-slate-700 py-3 rounded font-bold">Cancelar</button><button onclick="ejecutarCierre()" class="w-1/2 bg-blue-600 py-3 rounded font-bold">Confirmar</button></div>
        </div>
    </div>

    <div id="modalEditar" class="fixed inset-0 modal-overlay hidden items-center justify-center z-50 p-4 overflow-y-auto">
        <div class="glass-card p-6 w-full max-w-sm my-8">
            <h3 class="text-lg font-bold mb-4 text-emerald-400">Editar Operación</h3>
            <input type="hidden" id="modal-edit-id">
            <input type="hidden" id="modal-edit-orig-lotaje">
            <input type="hidden" id="modal-edit-orig-riesgo">
            
            <div class="mb-4"><label>Fecha y Hora de Apertura</label><input type="datetime-local" id="modal-edit-fecha"></div>
            <div class="mb-4"><label>Activo</label><input type="text" id="modal-edit-activo"></div>
            
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div><label>Estado</label><select id="modal-edit-estado"><option value="ABIERTA">Abierta</option><option value="BREAKEVEN">BreakEven</option><option value="CERRADA">Cerrada</option></select></div>
                <div><label>Lotaje Actual</label><input type="number" id="modal-edit-lotaje" step="any"></div>
            </div>
            
            <div class="grid grid-cols-2 gap-3 mb-6">
                <div><label>Precio Entrada</label><input type="number" id="modal-edit-entrada" step="any"></div>
                <div><label>PnL Total</label><input type="number" id="modal-edit-pnl" step="any"></div>
            </div>
            
            <div class="flex gap-3"><button onclick="cerrarModal('modalEditar')" class="w-1/2 bg-slate-700 py-3 rounded font-bold">Cancelar</button><button onclick="guardarEdicion()" class="w-1/2 bg-emerald-600 py-3 rounded font-bold">Guardar</button></div>
        </div>
    </div>

    <script>
        // --- CREDENCIALES SUPABASE ---
        const supabaseUrl = 'https://tdkhfbiltatjwzaubxtv.supabase.co';
        const supabaseKey = 'sb_publishable_nEVEwlTt78w6vjcYMYr4kQ_DS4mxM50';
        const db = window.supabase.createClient(supabaseUrl, supabaseKey);

        let chartInstance = null;
        let capitalBaseGlobal = 0;
        let capitalDisponibleGlobal = 0;
        let operacionActualCalculada = { tamano: 0, riesgoUsdt: 0 };
        let operacionesCargadas = [];

        window.addEventListener('DOMContentLoaded', () => { 
            // 1. PRIMERO cargamos la base de datos (Si el móvil bloquea algo, esto ya se ejecutó)
            asignarRiesgoAutomatico(); 
            cargarDatos(); 
            
            // 2. Arrancamos el auto-actualizador
            setInterval(cargarDatos, 60000);

            // 3. Pedimos notificaciones de forma segura a prueba de "crasheos"
            try {
                if ('Notification' in window && Notification.permission !== "granted" && Notification.permission !== "denied") {
                    // El .catch evita que los navegadores móviles rompan la app si rechazan la petición
                    let promise = Notification.requestPermission();
                    if (promise) {
                        promise.catch(err => console.log("Permiso de notificación ignorado", err));
                    }
                }
            } catch (error) {
                console.log("El navegador móvil no soporta notificaciones automáticas", error);
            }
        });

        function cerrarModal(id) { document.getElementById(id).classList.add('hidden'); document.getElementById(id).classList.remove('flex'); }

        // --- CAPITAL ---
        function abrirModalCapital(tipo) {
            document.getElementById('modal-cap-tipo').value = tipo;
            document.getElementById('modal-cap-titulo').innerText = tipo === 'DEPOSITO' ? 'Inyectar Capital' : 'Retirar Capital';
            document.getElementById('modal-cap-monto').value = '';
            document.getElementById('modalCapital').classList.remove('hidden'); document.getElementById('modalCapital').classList.add('flex');
        }

        async function ejecutarTransaccionCapital() {
            const monto = parseFloat(document.getElementById('modal-cap-monto').value);
            const tipo = document.getElementById('modal-cap-tipo').value;
            if(!monto || isNaN(monto)) return alert("Ingresa un monto válido");
            await db.from('historial_capital').insert([{ tipo: tipo, monto: monto }]);
            cerrarModal('modalCapital'); cargarDatos();
        }

        // --- FORMULARIO NUEVA OP ---
        function toggleOtro() { document.getElementById('div-otro').style.display = document.getElementById('activo').value === 'OTRO' ? 'block' : 'none'; }

        function asignarRiesgoAutomatico() {
            const activo = document.getElementById('activo').value;
            const tf = document.getElementById('temporalidad').value;
            const esCryptoMayor = (activo === 'BTC' || activo === 'ETH');
            
            const tfBaja = ['1m', '3m', '5m'].includes(tf);
            const tfMedia = ['15m', '1H'].includes(tf);
            const tfAlta = ['4H', '1D'].includes(tf);

            let riesgo = 0.25;

            if (tfAlta) riesgo = esCryptoMayor ? 5 : 3;
            else if (tfMedia) riesgo = esCryptoMayor ? 2 : 1;
            else if (tfBaja) riesgo = 0.25;

            document.getElementById('riesgoP').value = riesgo;
            calcularRiesgo();
        }

        function calcularSlPorDistancia() {
            const ent = parseFloat(document.getElementById('entrada').value) || 0;
            const dist = parseFloat(document.getElementById('sl-distancia').value) || 0;
            const dir = document.getElementById('direccion').value;

            if (ent > 0 && dist > 0) {
                let slCalc = dir === 'LONG' ? ent * (1 - (dist/100)) : ent * (1 + (dist/100));
                document.getElementById('sl').value = slCalc.toFixed(5);
            }
            calcularRiesgo();
        }

        function limpiarDistancia() { document.getElementById('sl-distancia').value = ''; calcularRiesgo(); }

// Historial local para no repetir notificaciones de la misma operación
        let opsNotificadas = JSON.parse(localStorage.getItem('ops_notificadas') || '[]');

        function comprobarYNotificar(op, progreso) {
            // Solo alertar si está ABIERTA, llegó al 100% y no ha sido notificada antes
            if (op.estado === 'ABIERTA' && parseFloat(progreso) >= 100 && !opsNotificadas.includes(op.id)) {
                
                if (window.Notification && Notification.permission === "granted") {
                    new Notification(`🚨 REVISAR TRADING: ${op.activo}`, {
                        body: `Tu posición en ${op.temporalidad} (${op.direccion}) alcanzó el 100% de velas esperadas. ¡Toma acción!`,
                        tag: op.id // Evita duplicados en el centro de notificaciones del sistema
                    });

                    // Guardar ID para no volver a notificar este trade
                    opsNotificadas.push(op.id);
                    localStorage.setItem('ops_notificadas', JSON.stringify(opsNotificadas));
                }
            }
        }


        function calcularRiesgo() {
            const rP = parseFloat(document.getElementById('riesgoP').value) || 0;
            const comisionP = parseFloat(document.getElementById('comision').value) || 0;
            const ent = parseFloat(document.getElementById('entrada').value) || 0;
            const sl = parseFloat(document.getElementById('sl').value) || 0;

            const riesgoUsdt = capitalDisponibleGlobal * (rP / 100);
            let tamano = 0; let volumen = 0;

            if (ent > 0 && sl > 0 && ent !== sl) {
                const divisor = Math.abs(ent - sl) + (ent + sl) * ((comisionP / 100));
                tamano = riesgoUsdt / divisor;
                volumen = tamano * ent;
            }

            operacionActualCalculada = { tamano, riesgoUsdt };
            document.getElementById('display-riesgo').innerHTML = `
                Riesgo: <b class="text-white">$${riesgoUsdt.toFixed(2)}</b> | 
                Lot: <b class="text-white">${tamano.toFixed(5)}</b> | 
                Vol: <b class="text-white">$${volumen.toFixed(2)}</b>
            `;
        }

        async function guardarOperacion() {
            let activo = document.getElementById('activo').value;
            if(activo === 'OTRO') activo = document.getElementById('activoOtro').value.toUpperCase();
            
            const ent = parseFloat(document.getElementById('entrada').value);
            const sl = parseFloat(document.getElementById('sl').value);
            if(!ent || !sl) return alert("Completa los precios.");

            const op = {
                activo: activo, direccion: document.getElementById('direccion').value,
                temporalidad: document.getElementById('temporalidad').value,
                precio_entrada: ent, precio_sl: sl, riesgo_porcentaje: document.getElementById('riesgoP').value,
                riesgo_usdt: operacionActualCalculada.riesgoUsdt, lotaje: operacionActualCalculada.tamano
                // fecha_operacion toma default now() desde Supabase
            };

            const btn = document.getElementById('btnGuardar');
            btn.innerText = "Guardando..."; btn.disabled = true;

            await db.from('bitacora_trading').insert([op]);
            
            document.getElementById('entrada').value = "1"; document.getElementById('sl').value = ""; document.getElementById('sl-distancia').value = "";
            await cargarDatos();
            btn.innerText = "Abrir Posición"; btn.disabled = false;
        }

        // --- BARRA DE PROGRESO DE VELAS ---
        function calcularProgresoVelas(fechaIso, tf) {
            const timestamp = new Date(fechaIso).getTime();
            let durationMin = 5; let targetCandles = 30;

            switch(tf) {
                case '1m': durationMin = 1; break;
                case '3m': durationMin = 3; break;
                case '5m': durationMin = 5; break;
                case '15m': durationMin = 15; break;
                case '1H': durationMin = 60; break;
                case '4H': durationMin = 240; targetCandles = 15; break;
                case '1D': durationMin = 1440; targetCandles = 15; break;
            }

            const durationMs = durationMin * 60 * 1000;
            const candleStart = Math.floor(timestamp / durationMs) * durationMs;
            const endTime = candleStart + (targetCandles * durationMs);
            const now = Date.now();

            let progress = ((now - candleStart) / (endTime - candleStart)) * 100;
            if (progress > 100) progress = 100;
            if (progress < 0) progress = 0;

            const velasTranscurridas = Math.floor((now - candleStart) / durationMs);

            let color = 'bg-blue-500 shadow-[0_0_8px_rgba(59,130,246,0.5)]';
            if (progress >= 80) color = 'bg-rose-500 shadow-[0_0_8px_rgba(244,63,94,0.5)]';
            else if (progress >= 50) color = 'bg-yellow-500 shadow-[0_0_8px_rgba(234,179,8,0.5)]';

            return { progress: progress.toFixed(1), velas: Math.max(0, Math.min(velasTranscurridas, targetCandles)), target: targetCandles, color: color };
        }

        // --- CARGAR Y RENDERIZAR ---
        async function cargarDatos() {
            const [resOps, resCap] = await Promise.all([
                db.from('bitacora_trading').select('*').order('fecha_operacion', { ascending: false }),
                db.from('historial_capital').select('*')
            ]);

            operacionesCargadas = resOps.data || [];
            const transaccionesCapital = resCap.data || [];

            capitalBaseGlobal = 0;
            transaccionesCapital.forEach(t => {
                if(t.tipo === 'DEPOSITO') capitalBaseGlobal += parseFloat(t.monto);
                if(t.tipo === 'RETIRO') capitalBaseGlobal -= parseFloat(t.monto);
            });
            document.getElementById('stat-capital-base').innerText = `$${capitalBaseGlobal.toFixed(2)}`;

            renderizarEstadisticas();
        }

        function renderizarEstadisticas() {
            let pnlTotal = 0; let riesgoFlotante = 0; let wins = 0, losses = 0, bes = 0;
            const abiertasHTML = []; const cerradasHTML = []; const historialPnl = [0];
            const comisionGlobal = parseFloat(document.getElementById('comision').value) || 0;

            operacionesCargadas.forEach(op => {
                const pnlOp = parseFloat(op.resultado_pnl || 0);
                let riesgoOpCalculado = parseFloat(op.riesgo_usdt || 0);
                
                if (op.estado === 'ABIERTA') {
                    const divisor = Math.abs(op.precio_entrada - op.precio_sl) + (op.precio_entrada + op.precio_sl) * ((comisionGlobal / 100) * 2);
                    riesgoOpCalculado = op.lotaje * divisor;
                    riesgoFlotante += riesgoOpCalculado;
                } else if(op.estado === 'CERRADA' || op.estado === 'BREAKEVEN') {
                    pnlTotal += pnlOp;
                }

                if(op.estado === 'CERRADA' || (op.estado === 'BREAKEVEN' && pnlOp != 0)) {
                    if(pnlOp > 0) wins++; else if(pnlOp < 0) losses++; else bes++;
                } else if (op.estado === 'BREAKEVEN' && pnlOp == 0) bes++;

                const fechaObj = new Date(op.fecha_operacion);
                const fecha = fechaObj.toLocaleDateString('es-ES', {month:'short', day:'numeric'});
                const hora = fechaObj.toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
                const badgeCls = op.direccion === 'LONG' ? 'bg-long' : 'bg-short';
                
                let htmlParciales = '';
                if(op.historial_parciales && op.historial_parciales.length > 0) {
                    htmlParciales = `<div class="mt-3 pt-2 border-t border-slate-700/50 text-xs">`;
                    op.historial_parciales.forEach(p => {
                        const dateP = new Date(p.fecha).toLocaleString('es-ES', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
                        const pSign = p.pnl >= 0 ? '+' : ''; const pCol = p.pnl >= 0 ? 'text-emerald-400' : 'text-rose-400';
                        htmlParciales += `<div class="flex justify-between text-slate-400 mb-1"><span>↳ Parcial (${p.lotaje} lot)</span><span>${dateP} <b class="${pCol} ml-2">${pSign}$${p.pnl}</b></span></div>`;
                    });
                    htmlParciales += `</div>`;
                }

            let barraHTML = '';
                if(op.estado === 'ABIERTA' || op.estado === 'BREAKEVEN') {
                    const prog = calcularProgresoVelas(op.fecha_operacion, op.temporalidad);
                    
                    // ◄ AÑADE ESTA LÍNEA AQUÍ PARA DISPARAR LA ALERTA
                    comprobarYNotificar(op, prog.progress);

                    barraHTML = `
                        <div class="mt-3 bg-slate-900/50 p-2 rounded border border-slate-700/50">
                            <div class="flex justify-between text-[9px] text-slate-400 mb-1 font-bold uppercase tracking-wider">
                                <span>Velas: ${prog.velas}/${prog.target}</span>
                                <span>${prog.progress}%</span>
                            </div>
                            <div class="w-full bg-slate-800 rounded-full h-1.5 border border-slate-700 overflow-hidden">
                                <div class="${prog.color} h-full rounded-full transition-all duration-1000 ease-out" style="width: ${prog.progress}%"></div>
                            </div>
                        </div>
                    `;
                }

                const cardButtons = op.estado === 'ABIERTA' || op.estado === 'BREAKEVEN' ? `
                    <div class="flex gap-2 pl-2 mt-3">
                        ${op.estado === 'ABIERTA' ? `<button onclick="accionEscudo('${op.id}')" title="Proteger a BK" class="flex-1 bg-slate-800 hover:bg-yellow-600/80 border border-slate-600 text-slate-300 py-2 rounded text-xs font-bold transition">🛡️ BK</button>` : `<div class="flex-1 text-center bg-yellow-900/30 text-yellow-500 py-2 rounded text-[10px] font-bold border border-yellow-700/50 flex items-center justify-center">🛡️ PROTEGIDO</div>`}
                        <button onclick="abrirModalCierre('${op.id}')" class="flex-1 bg-blue-600/20 text-blue-400 border border-blue-600/50 hover:bg-blue-600/40 py-2 rounded text-xs font-bold transition">Cerrar</button>
                        <button onclick="abrirModalEditar('${op.id}')" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white py-2 rounded text-xs transition">✏️ Editar</button>
                        <button onclick="eliminar('${op.id}')" class="px-3 bg-rose-900/30 hover:bg-rose-900 text-rose-400 border border-rose-900 rounded transition">🗑</button>
                    </div>` : `
                    <div class="flex gap-2 pl-2 mt-3">
                        <button onclick="abrirModalEditar('${op.id}')" class="text-xs text-slate-500 hover:text-white px-3 py-1.5 bg-slate-800 rounded transition">✏️ Editar</button>
                        <button onclick="eliminar('${op.id}')" class="text-xs text-slate-500 hover:text-rose-400 px-3 py-1.5 bg-slate-800 rounded transition">🗑 Eliminar</button>
                    </div>`;

                const cardHTML = `
                    <div class="glass-card p-4 relative overflow-hidden border-slate-700 mb-3 shadow-md">
                        <div class="absolute left-0 top-0 bottom-0 w-1 ${op.estado === 'CERRADA' ? (pnlOp >= 0 ? 'bg-emerald-500' : 'bg-rose-500') : (op.estado === 'BREAKEVEN' ? 'bg-yellow-500' : 'bg-blue-500')}"></div>
                        <div class="flex justify-between items-start mb-2 pl-2">
                            <div><h3 class="font-bold text-lg">${op.activo} <span class="text-[10px] px-1.5 py-0.5 rounded ${badgeCls} ml-1">${op.direccion}</span></h3><span class="text-xs text-slate-400 border border-slate-600 bg-slate-800 rounded px-1">${op.temporalidad}</span></div>
                            <div class="text-right"><div class="text-xs text-slate-400">${fecha} ${hora}</div>${op.estado === 'CERRADA' ? `<div class="font-bold text-lg mt-1 ${pnlOp >= 0 ? 'text-neon-green' : 'text-neon-red'}">${pnlOp >= 0 ? '+' : ''}$${pnlOp.toFixed(2)}</div>` : ''}</div>
                        </div>
                        <div class="grid grid-cols-4 gap-2 text-sm pl-2 mt-3">
                            <div><span class="text-slate-400 text-[9px] uppercase block">Entrada</span><span class="font-bold text-slate-200">${op.precio_entrada}</span></div>
                            <div><span class="text-slate-400 text-[9px] uppercase block">Stop Loss</span><span class="font-bold text-rose-400">${op.precio_sl}</span></div>
                            <div>
                                <span class="text-slate-400 text-[9px] uppercase block">Riesgo</span>
                                <span class="${op.estado === 'ABIERTA' ? 'text-neon-red font-bold' : 'text-slate-500 line-through'}">
                                    -$${riesgoOpCalculado.toFixed(2)} <span class="text-[9px] text-slate-400 font-normal ml-0.5">(${parseFloat(op.riesgo_porcentaje || 0).toFixed(1)}%)</span>
                                </span>
                            </div>
                            <div><span class="text-slate-400 text-[9px] uppercase block">Lotaje</span><span class="font-bold text-slate-200">${parseFloat(op.lotaje).toFixed(5)}</span></div>
                        </div>
                        ${htmlParciales}
                        ${barraHTML}
                        ${cardButtons}
                    </div>
                `;

                if(op.estado === 'ABIERTA' || op.estado === 'BREAKEVEN') abiertasHTML.push(cardHTML);
                else { historialPnl.unshift(pnlTotal); cerradasHTML.push(cardHTML); }
            });

            const capitalActual = capitalBaseGlobal + pnlTotal;
            capitalDisponibleGlobal = capitalActual - riesgoFlotante;
            const totalCerradas = wins + losses + bes;

            document.getElementById('stat-capital-disp').innerText = `$${capitalDisponibleGlobal.toFixed(2)}`;
            document.getElementById('stat-capital-disp').className = `text-4xl font-bold ${capitalDisponibleGlobal > capitalBaseGlobal ? 'text-neon-green' : 'text-white'} mb-4`;
            document.getElementById('stat-ops').innerText = operacionesCargadas.length;
            document.getElementById('stat-ops-detail').innerText = `${wins}W - ${losses}L - ${bes}BE`;
            document.getElementById('stat-winrate').innerText = totalCerradas > 0 ? `${Math.round((wins / totalCerradas) * 100)}%` : '0%';
            
            const pnlUI = document.getElementById('stat-pnl');
            pnlUI.innerText = `${pnlTotal >= 0 ? '+' : ''}$${pnlTotal.toFixed(2)}`;
            pnlUI.className = `text-3xl font-bold ${pnlTotal >= 0 ? 'text-neon-green' : 'text-neon-red'}`;

            document.getElementById('lista-abiertas').innerHTML = abiertasHTML.length ? abiertasHTML.join('') : '<p class="text-slate-500 text-sm italic">No hay posiciones activas.</p>';
            document.getElementById('lista-cerradas').innerHTML = cerradasHTML.length ? cerradasHTML.join('') : '<p class="text-slate-500 text-sm italic">El historial está vacío.</p>';

            actualizarGrafica(historialPnl, capitalBaseGlobal);
            calcularRiesgo(); 
        }

        // --- ACCIONES ESPECÍFICAS ---
        async function accionEscudo(id) {
            await db.from('bitacora_trading').update({ estado: 'BREAKEVEN' }).eq('id', id);
            cargarDatos();
        }

        // --- CIERRE ---
        function abrirModalCierre(id) {
            const op = operacionesCargadas.find(o => o.id === id);
            document.getElementById('modal-cierre-id').value = id; document.getElementById('modal-cierre-max-lot').value = op.lotaje;
            document.getElementById('modal-cierre-info').innerHTML = `Lotaje Abierto Disponible: <b class="text-white">${op.lotaje}</b>`;
            document.getElementById('modal-cierre-lotaje').value = op.lotaje; document.getElementById('modal-cierre-pnl').value = '';
            document.getElementById('modal-cierre-tipo').value = 'TOTAL'; toggleInputsCierre();
            document.getElementById('modalCierre').classList.remove('hidden'); document.getElementById('modalCierre').classList.add('flex');
        }

        function toggleInputsCierre() {
            const tipo = document.getElementById('modal-cierre-tipo').value;
            const max = document.getElementById('modal-cierre-max-lot').value;
            const inputLot = document.getElementById('div-lote-parcial');
            if(tipo === 'PARCIAL') { inputLot.classList.remove('hidden'); document.getElementById('modal-cierre-lotaje').value = ''; } 
            else { inputLot.classList.add('hidden'); document.getElementById('modal-cierre-lotaje').value = max; }
        }

        async function ejecutarCierre() {
            const id = document.getElementById('modal-cierre-id').value;
            const pnlNuevo = parseFloat(document.getElementById('modal-cierre-pnl').value);
            const lotajeCerrar = parseFloat(document.getElementById('modal-cierre-lotaje').value);
            const op = operacionesCargadas.find(o => o.id === id);
            
            if(isNaN(pnlNuevo) || isNaN(lotajeCerrar) || lotajeCerrar <= 0) return alert("Llena los campos correctamente.");
            if(lotajeCerrar > op.lotaje) return alert("No puedes cerrar un lotaje mayor al que tienes abierto.");

            const parcial = { fecha: new Date().toISOString(), lotaje: lotajeCerrar, pnl: pnlNuevo };
            const arrayParciales = op.historial_parciales || []; arrayParciales.push(parcial);

            const pnlAcumulado = (parseFloat(op.resultado_pnl) || 0) + pnlNuevo;
            const lotajeRestante = op.lotaje - lotajeCerrar;
            let nuevoEstado = op.estado;
            if(lotajeRestante <= 0.000001) nuevoEstado = 'CERRADA'; else nuevoEstado = 'BREAKEVEN';

            await db.from('bitacora_trading').update({ estado: nuevoEstado, resultado_pnl: pnlAcumulado, lotaje: Math.max(0, lotajeRestante), historial_parciales: arrayParciales }).eq('id', id);
            cerrarModal('modalCierre'); cargarDatos();
        }

        // --- EDICIÓN (INCLUYENDO FECHA) ---
        function abrirModalEditar(id) {
            const op = operacionesCargadas.find(o => o.id === id);
            document.getElementById('modal-edit-id').value = id; 
            document.getElementById('modal-edit-orig-lotaje').value = op.lotaje;
            document.getElementById('modal-edit-orig-riesgo').value = op.riesgo_usdt;
            
            // Ajustar fecha para el input datetime-local (zona horaria local)
            const d = new Date(op.fecha_operacion);
            d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
            document.getElementById('modal-edit-fecha').value = d.toISOString().slice(0, 16);

            document.getElementById('modal-edit-activo').value = op.activo;
            document.getElementById('modal-edit-estado').value = op.estado; 
            document.getElementById('modal-edit-lotaje').value = op.lotaje;
            document.getElementById('modal-edit-entrada').value = op.precio_entrada; 
            document.getElementById('modal-edit-pnl').value = op.resultado_pnl;
            
            document.getElementById('modalEditar').classList.remove('hidden'); 
            document.getElementById('modalEditar').classList.add('flex');
        }

        async function guardarEdicion() {
            const id = document.getElementById('modal-edit-id').value;
            const opOrig = operacionesCargadas.find(o => o.id === id);
            
            const nuevoLotaje = parseFloat(document.getElementById('modal-edit-lotaje').value);
            const nuevoEntrada = parseFloat(document.getElementById('modal-edit-entrada').value);
            const nuevoEstado = document.getElementById('modal-edit-estado').value;
            const comisionGlobal = parseFloat(document.getElementById('comision').value) || 0;
            
            // Convertir la fecha local del input nuevamente a formato UTC ISO
            const nuevaFechaIso = new Date(document.getElementById('modal-edit-fecha').value).toISOString();

            let nuevoRiesgoUsdt = parseFloat(opOrig.riesgo_usdt);
            if (nuevoEstado === 'ABIERTA') {
                const divisor = Math.abs(nuevoEntrada - opOrig.precio_sl) + (nuevoEntrada + opOrig.precio_sl) * ((comisionGlobal / 100));
                nuevoRiesgoUsdt = nuevoLotaje * divisor;
            }

            const up = { 
                fecha_operacion: nuevaFechaIso,
                activo: document.getElementById('modal-edit-activo').value.toUpperCase(), 
                estado: nuevoEstado, 
                lotaje: nuevoLotaje, 
                riesgo_usdt: nuevoRiesgoUsdt,
                precio_entrada: nuevoEntrada, 
                resultado_pnl: parseFloat(document.getElementById('modal-edit-pnl').value) 
            };
            
            await db.from('bitacora_trading').update(up).eq('id', id);
            cerrarModal('modalEditar'); 
            cargarDatos();
        }

        async function eliminar(id) {
            if(confirm("¿Seguro que deseas eliminar este registro para siempre? El saldo volverá a tu cuenta.")) {
                await db.from('bitacora_trading').delete().eq('id', id); cargarDatos();
            }
        }

        function actualizarGrafica(datosPnl, base) {
            let arrayCurva = [base]; let acumulador = base;
            datosPnl.forEach(pnl => { if(pnl !== 0) { acumulador += pnl; arrayCurva.push(acumulador); }});
            const ctx = document.getElementById('chartCapital').getContext('2d');
            if(chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, { type: 'line', data: { labels: arrayCurva.map((_, i) => `Op ${i}`), datasets: [{ label: 'Capital', data: arrayCurva, borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', borderWidth: 2, pointRadius: 3, pointBackgroundColor: '#0f172a', fill: true, tension: 0.3 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { color: '#1e293b' }, ticks: { color: '#64748b' } } } } });
        }
    </script>

<script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrado', reg))
                    .catch(err => console.log('Error en SW', err));
            });
        }
    </script>
